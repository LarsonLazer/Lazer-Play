<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lazer Play</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: linear-gradient(135deg, #07111f 0%, #111827 100%);
        color: #f8fafc;
      }
      .container {
        max-width: 920px;
        margin: 0 auto;
        padding: 48px 24px;
      }
      .card {
        background: rgba(15, 23, 42, 0.92);
        border: 1px solid rgba(255,255,255,0.08);
        padding: 32px;
        border-radius: 24px;
        box-shadow: 0 18px 40px rgba(0,0,0,0.25);
      }
      .card h1 { margin-top: 0; font-size: 32px; }
      .card p { color: #cbd5e1; line-height: 1.6; }
      a { color: #93c5fd; }
      .pill {
        display: inline-block;
        margin-top: 12px;
        padding: 10px 14px;
        background: linear-gradient(135deg, #2563eb, #38bdf8);
        border-radius: 999px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>Lazer Play</h1>
        <p>Plataforma moderna de streaming de música, vídeos, podcasts e artistas independentes.</p>
        <p>API disponível em <a href="/api/health">/api/health</a></p>
        <p>Exemplo de login: <strong>demo@lazerplay.com</strong> / <strong>123456</strong></p>
        <div class="pill">Pronto para Vercel</div>
      </div>
    </div>
  </body>
</html>
